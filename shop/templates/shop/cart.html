<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Твоя корзина - Gamer Zone</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 40px; }
        .cart-item { background: #1e1e1e; padding: 20px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; border: 1px solid #333; }
        .total { font-size: 1.5rem; color: #00ffea; margin-top: 20px; text-align: right; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .btn-buy { background: #00ffea; color: #121212; }
        .btn-clear { background: #ff4e4e; color: white; }
    </style>
</head>
<body>
    <h1>🛒 Твой заказ</h1>
    {% for item in items %}
        <div class="cart-item">
            <span>{{ item.product.name }} (x{{ item.quantity }})</span>
            <span>{{ item.total_item_price }} ₽</span>
        </div>
    {% empty %}
        <p>Корзина пуста. Бегом за покупками!</p>
    {% endfor %}

    {% if items %}
        <div class="total">Итого: {{ total_price }} ₽</div>
        <a href="#" class="btn btn-buy">Оформить заказ</a>
        <a href="{% url 'clear_cart' %}" class="btn btn-clear">Очистить</a>
    {% endif %}
    <br><br>
    <a href="{% url 'index' %}" style="color: #00ffea;">← Назад в магазин</a>
</body>
</html>
