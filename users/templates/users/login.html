<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Gamer Zone</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 1px solid #00ffea; width: 400px; box-shadow: 0 0 20px rgba(0, 255, 234, 0.2); }
        h2 { color: #00ffea; text-align: center; margin-bottom: 25px; text-transform: uppercase; }

        p { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #00ffea; }

        /* Убираем лишние подсказки ( help text ) */
        .helptext, .help-block {
            display: none;
        }

        /* Красивое оформление ошибок */
        ul.errorlist {
            color: #ff4e4e;
            list-style: none;
            padding: 0;
            margin: 5px 0;
            font-size: 0.8rem;
        }

        button { width: 100%; padding: 14px; background: #00ffea; color: #121212; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #00ccbb; transform: scale(1.02); }

        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #bbb; }
        a { color: #00ffea; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Вход в аккаунт</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Войти в зону</button>
        </form>
        <div class="footer-link">
            Нет аккаунта? <a href="{% url 'register' %}">Создать сейчас</a>
        </div>
    </div>
</body>
</html>
